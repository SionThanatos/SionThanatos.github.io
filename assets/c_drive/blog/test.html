<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>blog test</title>
  <style>
    .blog-root {
      font-family: Arial, sans-serif;
      font-size: 18px;
      line-height: 1.55;
      margin: 20px 20px 20px 40px;
      color: #000;
      overflow-wrap: anywhere;
    }

    .blog-root h3 {
      font-size: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 3px;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000;
    }

    .blog-root p {
      margin: 0 0 12px 0;
      color: #000;
    }
  </style>
</head>

<body>
  <div class="blog-root">
    <h3>Blog Test</h3>
    <p>This is a test blog page.</p>
    <p>If this opens in a floating window like the CV page, the blog folder is wired correctly.</p>
  </div>
</body>

</html>
